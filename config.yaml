# ADF Automation Scripts — Configuration File
# ============================================
# Works with:
#   - adf_report_generator.py
#   - adf_linked_service_inventory.py
#
# HOW TO USE:
#   1. Copy this file:  cp config.yaml.example config.yaml
#   2. Fill in your real values in config.yaml
#   3. NEVER commit config.yaml to Git — it is in .gitignore
#
# WHERE TO FIND THESE VALUES:
#   subscription_id : az account show --query id -o tsv
#   resource_group  : Azure Portal → your ADF → Resource group (top right)
#   factory_name    : Azure Portal → your ADF → name in the top left

subscription_id: YOUR_SUBSCRIPTION_ID_HERE
resource_group: YOUR_RESOURCE_GROUP_HERE
factory_name: YOUR_ADF_FACTORY_NAME_HERE
